name: Build and Test AMI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'aws-windows-ssh.pkr.hcl'
      - 'files/**'
      - '.github/workflows/build-and-test-ami.yml'
  push:
    branches:
      - main
    paths:
      - 'aws-windows-ssh.pkr.hcl'
      - 'files/**'
      - '.github/workflows/build-and-test-ami.yml'

env:
  PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@ce93c3c08a6c2ff2275bf4b54ff0d9a75f6c9789 # v3.4.0

      - name: Cache Packer plugins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.config/packer/plugins
          key: ${{ runner.os }}-packer-${{ hashFiles('aws-windows-ssh.pkr.hcl') }}
          restore-keys: |
            ${{ runner.os }}-packer-

      - name: Initialize Packer
        run: packer init ./aws-windows-ssh.pkr.hcl

      - name: Validate Packer Template
        run: packer validate ./aws-windows-ssh.pkr.hcl

      - name: Build AMI with Packer
        env:
          PKR_VAR_workflow_run_id: ${{ github.run_id }}
        run: |
          packer build -var "enable_fast_launch=false" ./aws-windows-ssh.pkr.hcl
          AMI_ID=$(jq -r '.builds[-1].artifact_id' packer-manifest.json | cut -d: -f2)
          echo "AMI_ID=${AMI_ID}" >> "$GITHUB_ENV"

      - name: Generate SSH Key Pair
        run: |
          ssh-keygen -t rsa -b 4096 -f test-key -N "" -C "github-actions-test"
          chmod 600 test-key

      - name: Import SSH Public Key to AWS
        run: |
          KEY_NAME="github-actions-test-$(date +%s)"
          KEY_PAIR_ID=$(aws ec2 import-key-pair \
            --key-name "${KEY_NAME}" \
            --public-key-material fileb://test-key.pub \
            --query "KeyPairId" \
            --output text \
            --region ${{ env.AWS_REGION }})
          aws ec2 create-tags \
            --resources "${KEY_PAIR_ID}" \
            --tags "Key=WorkflowRunId,Value=${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }}
          echo "KEY_NAME=${KEY_NAME}" >> "$GITHUB_ENV"

      - name: Get Default VPC and Subnet
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=isDefault,Values=true" \
            --query "Vpcs[0].VpcId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          # Collect all subnets in AZs that support t3a.xlarge so the launch step
          # can try each one in turn if an AZ has InsufficientInstanceCapacity.
          # t3a.xlarge is supported in: us-east-1a, us-east-1b, us-east-1c, us-east-1d, us-east-1f
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=availability-zone,Values=us-east-1a,us-east-1b,us-east-1c,us-east-1d,us-east-1f" \
            --query "Subnets[*].SubnetId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "VPC_ID=${VPC_ID}" >> "$GITHUB_ENV"
          echo "SUBNET_IDS=${SUBNET_IDS}" >> "$GITHUB_ENV"

      - name: Create Security Group
        run: |
          SG_NAME="github-actions-test-$(date +%s)"
          SG_ID=$(aws ec2 create-security-group \
            --group-name "${SG_NAME}" \
            --description "Temporary security group for AMI testing" \
            --vpc-id "${VPC_ID}" \
            --query "GroupId" \
            --output text \
            --region ${{ env.AWS_REGION }})

          aws ec2 authorize-security-group-ingress \
            --group-id "${SG_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr 0.0.0.0/0 \
            --region ${{ env.AWS_REGION }}

          aws ec2 create-tags \
            --resources "${SG_ID}" \
            --tags "Key=WorkflowRunId,Value=${{ github.run_id }}" \
            --region ${{ env.AWS_REGION }}

          echo "SECURITY_GROUP_ID=${SG_ID}" >> "$GITHUB_ENV"

      - name: Launch Test Instance
        run: |
          INSTANCE_ID=""
          for SUBNET_ID in $SUBNET_IDS; do
            echo "Trying subnet ${SUBNET_ID}..."
            if INSTANCE_ID=$(aws ec2 run-instances \
              --image-id "${AMI_ID}" \
              --instance-type t3a.xlarge \
              --key-name "${KEY_NAME}" \
              --security-group-ids "${SECURITY_GROUP_ID}" \
              --subnet-id "${SUBNET_ID}" \
              --metadata-options "HttpTokens=required,HttpPutResponseHopLimit=1,HttpEndpoint=enabled" \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=github-actions-ami-test},{Key=ManagedBy,Value=github-actions},{Key=WorkflowRunId,Value=${{ github.run_id }}}]" \
              --query "Instances[0].InstanceId" \
              --output text \
              --region ${{ env.AWS_REGION }} 2>&1); then
              break
            else
              echo "Failed in subnet ${SUBNET_ID}: ${INSTANCE_ID}"
              INSTANCE_ID=""
            fi
          done

          if [ -z "${INSTANCE_ID}" ]; then
            echo "Failed to launch instance in any available subnet"
            exit 1
          fi

          echo "INSTANCE_ID=${INSTANCE_ID}" >> "$GITHUB_ENV"
          echo "Launched instance: ${INSTANCE_ID}"

      - name: Wait for Instance to be Running
        run: |
          echo "Waiting for instance to be in running state..."
          aws ec2 wait instance-running \
            --instance-ids "${INSTANCE_ID}" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Instance Status OK
        run: |
          echo "Waiting for instance status checks to pass..."
          aws ec2 wait instance-status-ok \
            --instance-ids "${INSTANCE_ID}" \
            --region ${{ env.AWS_REGION }}

      - name: Get Instance Public IP
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "${INSTANCE_ID}" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text \
            --region ${{ env.AWS_REGION }})

          echo "PUBLIC_IP=${PUBLIC_IP}" >> "$GITHUB_ENV"
          echo "Instance IP: ${PUBLIC_IP}"

      - name: Test SSH Connection
        run: |
          echo "Testing SSH connection to ${PUBLIC_IP}"

          # Configure SSH to skip host key checking for this test
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host test-instance
            HostName ${PUBLIC_IP}
            User Administrator
            IdentityFile $(pwd)/test-key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 30
          EOF

          # Retry SSH connection with longer wait times if needed
          MAX_ATTEMPTS=20
          WAIT_TIME=30

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "SSH attempt $i/$MAX_ATTEMPTS..."
            if ssh test-instance "echo 'SSH connection successful'" 2>&1; then
              echo "✅ SSH connection test passed!"
              exit 0
            fi
            if [ "$i" -lt "$MAX_ATTEMPTS" ]; then
              echo "Connection failed, retrying in ${WAIT_TIME} seconds..."
              sleep "$WAIT_TIME"
            fi
          done

          echo "❌ SSH connection test failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Test IMDSv2 Enforcement
        run: |
          echo "Verifying IMDSv2 is properly enforced..."

          # Test that IMDSv1 is blocked
          echo "Testing IMDSv1 (should fail)..."
          if ssh test-instance << 'EOF' > /tmp/imdsv1-test.log 2>&1
          powershell -Command @"
          try {
            Invoke-RestMethod -Uri 'http://169.254.169.254/latest/meta-data/instance-id' -TimeoutSec 5 -ErrorAction Stop
            Write-Host 'ERROR: IMDSv1 should be blocked but succeeded'
            exit 1
          } catch {
            Write-Host 'SUCCESS: IMDSv1 correctly blocked'
            exit 0
          }
          "@
          EOF
          then
            echo "✅ IMDSv1 blocking verified"
          else
            cat /tmp/imdsv1-test.log
            echo "❌ IMDSv1 test failed"
            exit 1
          fi

          # Test that IMDSv2 works
          echo "Testing IMDSv2 (should succeed)..."
          if ssh test-instance << 'EOF' > /tmp/imdsv2-test.log 2>&1
          powershell -Command @"
          try {
            `$token = Invoke-RestMethod -Headers @{'X-aws-ec2-metadata-token-ttl-seconds' = '21600'} -Method PUT -Uri 'http://169.254.169.254/latest/api/token'
            `$instanceId = Invoke-RestMethod -Headers @{'X-aws-ec2-metadata-token' = `$token} -Uri 'http://169.254.169.254/latest/meta-data/instance-id'
            Write-Host 'SUCCESS: IMDSv2 working correctly'
            Write-Host 'Instance ID:' `$instanceId
            exit 0
          } catch {
            Write-Host 'ERROR: IMDSv2 failed'
            Write-Host `$_
            exit 1
          }
          "@
          EOF
          then
            echo "✅ IMDSv2 functionality verified"
          else
            cat /tmp/imdsv2-test.log
            echo "❌ IMDSv2 test failed"
            exit 1
          fi
      - name: Cleanup - Terminate Instance
        if: always()
        run: |
          if [ -n "${INSTANCE_ID}" ]; then
            echo "Terminating instance ${INSTANCE_ID}..."
            aws ec2 terminate-instances \
              --instance-ids "${INSTANCE_ID}" \
              --region ${{ env.AWS_REGION }} || true

            echo "Waiting for instance to terminate..."
            aws ec2 wait instance-terminated \
              --instance-ids "${INSTANCE_ID}" \
              --region ${{ env.AWS_REGION }} || true
          fi

      - name: Cleanup - Delete Security Group
        if: always()
        run: |
          if [ -n "${SECURITY_GROUP_ID}" ]; then
            echo "Deleting security group ${SECURITY_GROUP_ID}..."
            aws ec2 delete-security-group \
              --group-id "${SECURITY_GROUP_ID}" \
              --region ${{ env.AWS_REGION }} || true
          fi

      - name: Cleanup - Delete SSH Key
        if: always()
        run: |
          if [ -n "${KEY_NAME}" ]; then
            echo "Deleting SSH key pair ${KEY_NAME}..."
            aws ec2 delete-key-pair \
              --key-name "${KEY_NAME}" \
              --region ${{ env.AWS_REGION }} || true
          fi

          # Clean up local SSH keys
          rm -f test-key test-key.pub

      - name: Cleanup - Deregister AMI
        if: always()
        run: |
          if [ -n "${AMI_ID}" ]; then
            echo "Deregistering AMI ${AMI_ID}..."

            # Get snapshot IDs before deregistering
            SNAPSHOT_IDS=$(aws ec2 describe-images \
              --image-ids "${AMI_ID}" \
              --query "Images[0].BlockDeviceMappings[*].Ebs.SnapshotId" \
              --output text \
              --region ${{ env.AWS_REGION }})

            # Deregister AMI
            aws ec2 deregister-image \
              --image-id "${AMI_ID}" \
              --region ${{ env.AWS_REGION }} || true

            # Delete snapshots
            for snapshot in ${SNAPSHOT_IDS}; do
              echo "Deleting snapshot ${snapshot}..."
              aws ec2 delete-snapshot \
                --snapshot-id "${snapshot}" \
                --region ${{ env.AWS_REGION }} || true
            done
          fi

      - name: Cleanup - Orphan Sweep
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          REGION="${{ env.AWS_REGION }}"

          # Terminate any instances tagged with this run (covers Packer build instance
          # + our test instance if the env-var-guarded step above was skipped)
          INSTANCES=$(aws ec2 describe-instances \
            --filters "Name=tag:WorkflowRunId,Values=${RUN_ID}" \
                      "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text --region "$REGION")
          if [ -n "$INSTANCES" ]; then
            echo "Orphan sweep: terminating instances ${INSTANCES}..."
            # shellcheck disable=SC2086
            aws ec2 terminate-instances --instance-ids $INSTANCES --region "$REGION" || true
            # shellcheck disable=SC2086
            aws ec2 wait instance-terminated --instance-ids $INSTANCES --region "$REGION" || true
          fi

          # Deregister any AMIs tagged with this run and delete their snapshots
          AMIS=$(aws ec2 describe-images --owners self \
            --filters "Name=tag:WorkflowRunId,Values=${RUN_ID}" \
            --query "Images[].ImageId" --output text --region "$REGION")
          for ami in $AMIS; do
            echo "Orphan sweep: deregistering AMI ${ami}..."
            SNAPS=$(aws ec2 describe-images --image-ids "$ami" \
              --query "Images[0].BlockDeviceMappings[*].Ebs.SnapshotId" \
              --output text --region "$REGION")
            aws ec2 deregister-image --image-id "$ami" --region "$REGION" || true
            for snap in $SNAPS; do
              aws ec2 delete-snapshot --snapshot-id "$snap" --region "$REGION" || true
            done
          done

          # Delete tagged security groups and key pairs
          SGS=$(aws ec2 describe-security-groups \
            --filters "Name=tag:WorkflowRunId,Values=${RUN_ID}" \
            --query "SecurityGroups[].GroupId" --output text --region "$REGION")
          for sg in $SGS; do
            echo "Orphan sweep: deleting security group ${sg}..."
            aws ec2 delete-security-group --group-id "$sg" --region "$REGION" || true
          done

          KPS=$(aws ec2 describe-key-pairs \
            --filters "Name=tag:WorkflowRunId,Values=${RUN_ID}" \
            --query "KeyPairs[].KeyName" --output text --region "$REGION")
          for kp in $KPS; do
            echo "Orphan sweep: deleting key pair ${kp}..."
            aws ec2 delete-key-pair --key-name "$kp" --region "$REGION" || true
          done

          # Best-effort cleanup of Packer's internal packer_* temp resources.
          # delete-security-group fails harmlessly if the SG is still attached to
          # a running instance; deleting a keypair from EC2 does not affect
          # already-launched instances.
          PACKER_SGS=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=packer_*" \
            --query "SecurityGroups[].GroupId" --output text --region "$REGION")
          for sg in $PACKER_SGS; do
            aws ec2 delete-security-group --group-id "$sg" --region "$REGION" 2>/dev/null || true
          done

          PACKER_KPS=$(aws ec2 describe-key-pairs \
            --filters "Name=key-name,Values=packer_*" \
            --query "KeyPairs[].KeyName" --output text --region "$REGION")
          for kp in $PACKER_KPS; do
            aws ec2 delete-key-pair --key-name "$kp" --region "$REGION" 2>/dev/null || true
          done
